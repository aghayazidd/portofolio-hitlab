<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Daftar Tugas</h1>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Tambahkan tugas baru...">
        <button id="addBtn">Tambah</button>
    </div>

    <ul id="taskList"></ul>

    <div class="footer">
        <span id="taskCount">0 tugas</span>
        <button id="clearCompleted">Hapus yang Selesai</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
